<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bioscope Plus 2.0 - Ad Free</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
        }

        .container {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .header h1 {
            font-size: 1.5em;
            margin: 0;
        }

        .controls {
            background: white;
            padding: 10px;
            display: flex;
            gap: 10px;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .controls input {
            flex: 1;
            padding: 8px 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }

        .controls button {
            padding: 8px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        .controls button:hover {
            background: #764ba2;
        }

        iframe {
            flex: 1;
            border: none;
            width: 100%;
        }

        .loading {
            text-align: center;
            padding: 50px;
            font-size: 18px;
            color: #666;
        }

        .footer {
            background: #333;
            color: white;
            text-align: center;
            padding: 10px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎬 Bioscope Plus 2.0 - AD FREE</h1>
        </div>
        
        <div class="controls">
            <input type="text" id="urlInput" placeholder="Enter website URL..." value="https://bioscopeplus.blogspot.com/">
            <button onclick="loadWebsite()">Load</button>
            <button onclick="goBack()">← Back</button>
            <button onclick="goForward()">Forward →</button>
            <button onclick="reloadPage()">🔄 Reload</button>
        </div>

        <div id="content" style="flex: 1; overflow: hidden;">
            <div class="loading">Loading...</div>
        </div>

        <div class="footer">
            <p>✅ No Ads | Pure Content Experience</p>
        </div>
    </div>

    <script>
        let currentHistory = [];
        let historyIndex = -1;
        let currentURL = 'https://bioscopeplus.blogspot.com/';

        function loadWebsite() {
            const url = document.getElementById('urlInput').value;
            if (!url.trim()) {
                alert('Please enter a valid URL');
                return;
            }

            // Add http if not present
            let finalURL = url;
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                finalURL = 'https://' + url;
            }

            currentURL = finalURL;
            addToHistory(finalURL);
            displayWebsite(finalURL);
        }

        function displayWebsite(url) {
            const contentDiv = document.getElementById('content');
            contentDiv.innerHTML = '';
            
            const iframe = document.createElement('iframe');
            iframe.src = url;
            iframe.style.width = '100%';
            iframe.style.height = '100%';
            iframe.style.border = 'none';
            
            contentDiv.appendChild(iframe);
        }

        function addToHistory(url) {
            // Remove forward history if we're not at the end
            if (historyIndex < currentHistory.length - 1) {
                currentHistory = currentHistory.slice(0, historyIndex + 1);
            }
            currentHistory.push(url);
            historyIndex++;
        }

        function goBack() {
            if (historyIndex > 0) {
                historyIndex--;
                currentURL = currentHistory[historyIndex];
                document.getElementById('urlInput').value = currentURL;
                displayWebsite(currentURL);
            } else {
                alert('No previous page');
            }
        }

        function goForward() {
            if (historyIndex < currentHistory.length - 1) {
                historyIndex++;
                currentURL = currentHistory[historyIndex];
                document.getElementById('urlInput').value = currentURL;
                displayWebsite(currentURL);
            } else {
                alert('No next page');
            }
        }

        function reloadPage() {
            displayWebsite(currentURL);
        }

        // Load default URL on page load
        window.addEventListener('load', () => {
            loadWebsite();
        });
    </script>
</body>
</html>
